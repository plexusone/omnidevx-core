site_name: OmniDevX Core
site_description: Canonical event model and collectors for developer-experience telemetry
site_url: https://plexusone.github.io/omnidevx-core
repo_name: plexusone/omnidevx-core
repo_url: https://github.com/plexusone/omnidevx-core

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Dark mode first (PlexusOne default)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

extra_css:
  - https://plexusone.dev/css/plexusone-mkdocs.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts:
      - Canonical Events: concepts/events.md
      - Event Store: concepts/store.md
      - Period Reports: concepts/reports.md
      - Identity: concepts/identity.md
      - Privacy Model: concepts/privacy.md
  - Providers:
      - Claude Code: providers/claudecode.md
      - Git: providers/git.md
      - OpenTelemetry: providers/genericotel.md
  - API Reference: https://pkg.go.dev/github.com/plexusone/omnidevx-core
  - Releases:
      - v0.1.0: releases/v0.1.0.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/plexusone/omnidevx-core
